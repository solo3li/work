version: '3.8'

services:
  app:
    build: .
    container_name: uis_app
    restart: always
    ports:
      - "5035:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=uis_db;Username=postgres;Password=password123
    depends_on:
      - db
      - redis

  db:
    image: postgres:15-alpine
    container_name: uis_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: uis_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: uis_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@uis.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db

  # Optional: Redis for SignalR scaleout/caching
  redis:
    image: redis:7-alpine
    container_name: uis_redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
