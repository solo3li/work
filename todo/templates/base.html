<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Funny Todo - Don't Forget or Else!</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@400;700&display=swap" rel="stylesheet">
</head>
<body class="light-mode">
    <nav>
        <div class="logo">🤪 FunnyTodo</div>
        <div class="nav-links">
            {% if user.is_authenticated %}
                <span>Hi, {{ user.email }}!</span>
                <a href="{% url 'task_list' %}">Tasks</a>
                <a href="{% url 'logout' %}">Run Away (Logout)</a>
                <button id="theme-toggle">🌗</button>
            {% else %}
                <a href="{% url 'login' %}">Join the Chaos</a>
            {% endif %}
        </div>
    </nav>

    <main class="container">
        {% if messages %}
            <div class="messages">
                {% for message in messages %}
                    <div class="message {{ message.tags }}">{{ message }}</div>
                {% endfor %}
            </div>
        {% endif %}
        {% block content %}{% endblock %}
    </main>

    <footer>
        <p>© 2026 Funny Todo - Made with ☕ and Panic</p>
    </footer>

    <script src="/static/js/main.js"></script>
</body>
</html>
