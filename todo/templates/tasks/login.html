{% extends 'base.html' %}

{% block content %}
<div class="card">
    <h1>Stop Right There! ✋</h1>
    <p>We need your email to keep the task-eating monsters away.</p>
    <form method="POST">
        {% csrf_token %}
        <input type="email" name="email" placeholder="Your email (e.g., procrastinator@expert.com)" required>
        <button type="submit">Send me a magic code ✨</button>
    </form>
</div>
{% endblock %}
