{% extends 'base.html' %}

{% block content %}
<div class="card">
    <h1>Your Chaos Control Center 🌪️</h1>
    
    <div class="filters">
        <form method="GET" style="display: flex; gap: 10px; align-items: center;">
            <input type="text" name="q" placeholder="Search for a lost task..." value="{{ query }}">
            <select name="category" onchange="this.form.submit()">
                <option value="">All Categories</option>
                {% for cat in categories %}
                    <option value="{{ cat.id }}" {% if request.GET.category == cat.id|stringformat:"s" %}selected{% endif %}>{{ cat.name }}</option>
                {% endfor %}
            </select>
            <button type="submit">Filter</button>
        </form>
    </div>

    <div style="margin: 1.5rem 0;">
        <a href="{% url 'add_task' %}" class="btn-primary" style="text-decoration: none; background: var(--secondary); color: white; padding: 0.8rem 1.5rem; border-radius: 10px; font-family: 'Fredoka One'; display: inline-block;">+ New Task</a>
    </div>

    <div id="task-list">
        {% for task in tasks %}
            <div class="task-item priority-{{ task.priority }} {% if task.completed %}completed{% endif %}" data-id="{{ task.id }}">
                <span class="drag-handle" style="margin-right: 15px; cursor: ns-resize;">⠿</span>
                <div style="flex-grow: 1;">
                    <strong>{{ task.title }}</strong>
                    <br>
                    <small>{{ task.description|truncatechars:50 }}</small>
                </div>
                <div class="task-actions">
                    <a href="{% url 'toggle_task' task.id %}" title="Done/Undone">✅</a>
                    <a href="{% url 'delete_task' task.id %}" onclick="return confirm('Really delete? The task will cry.')" title="Burn it!">🔥</a>
                </div>
            </div>
        {% empty %}
            <p>No tasks? You're either a god of productivity or extremely lazy. 🤷‍♂️</p>
        {% endfor %}
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.14.0/Sortable.min.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        const el = document.getElementById('task-list');
        if (el) {
            Sortable.create(el, {
                animation: 150,
                handle: '.drag-handle',
                onEnd: function (evt) {
                    const order = Array.from(el.children).map(item => item.dataset.id);
                    const formData = new FormData();
                    order.forEach(id => formData.append('task_order[]', id));
                    
                    fetch("{% url 'reorder_tasks' %}", {
                        method: 'POST',
                        headers: {
                            'X-CSRFToken': '{{ csrf_token }}'
                        },
                        body: formData
                    });
                }
            });
        }
    });
</script>
{% endblock %}
