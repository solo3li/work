<!DOCTYPE html>
<html>
<head>
    <style>
        .container { font-family: 'Comic Sans MS', cursive, sans-serif; padding: 20px; background: #f0f4f8; border-radius: 20px; border: 3px dashed #ff4757; }
        .header { color: #ff4757; font-size: 24px; font-weight: bold; }
        .content { font-size: 16px; color: #333; margin-top: 15px; }
        .footer { margin-top: 20px; font-size: 12px; color: #777; font-style: italic; }
        .emoji { font-size: 40px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">{{ title }}</div>
        <div class="content">
            <p>{{ message }}</p>
            {% if code %}
                <div style="background: white; padding: 15px; border-radius: 10px; font-size: 32px; text-align: center; letter-spacing: 5px; color: #2ed573; border: 2px solid #2ed573;">
                    {{ code }}
                </div>
            {% endif %}
        </div>
        <div class="emoji">🤪</div>
        <div class="footer">
            This message was brought to you by the Department of Anti-Procrastination.
        </div>
    </div>
</body>
</html>
