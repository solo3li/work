{% extends "base.html" %}
{% block title %}Checkout - LCwiki{% endblock %}
{% block content %}
<div style="padding: 60px 0; max-width: 800px; margin: 0 auto;">
    <h1 style="margin-bottom: 40px; text-align: center;">Shipping Information</h1>
    <form method="post">
        {% csrf_token %}
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
            <div>
                <label>First Name</label>
                <input type="text" name="first_name" required>
            </div>
            <div>
                <label>Last Name</label>
                <input type="text" name="last_name" required>
            </div>
        </div>
        <div>
            <label>Address</label>
            <input type="text" name="address" required>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
            <div>
                <label>Postal Code</label>
                <input type="text" name="postal_code" required>
            </div>
            <div>
                <label>City</label>
                <input type="text" name="city" required>
            </div>
        </div>
        <button type="submit" class="btn" style="width: 100%; margin-top: 40px; padding: 15px;">Place Order</button>
    </form>
</div>
{% endblock %}
