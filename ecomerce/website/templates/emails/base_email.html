<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            color: #1a1a1a;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 40px 20px;
            border: 1px solid #f0f0f0;
        }
        .header {
            text-align: center;
            padding-bottom: 40px;
            border-bottom: 1px solid #f9f9f9;
        }
        .logo {
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: #1a1a1a;
            text-decoration: none;
        }
        .content {
            padding: 40px 0;
            line-height: 1.6;
            text-align: center;
        }
        .title {
            font-family: 'Georgia', serif;
            font-size: 28px;
            margin-bottom: 20px;
            color: #1a1a1a;
        }
        .code-box {
            background-color: #FAF9F6;
            border: 1px solid #C5A021;
            padding: 20px;
            margin: 30px 0;
            display: inline-block;
        }
        .code {
            font-size: 32px;
            font-weight: bold;
            letter-spacing: 10px;
            color: #C5A021;
        }
        .footer {
            padding-top: 40px;
            border-top: 1px solid #f9f9f9;
            text-align: center;
            font-size: 12px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .btn {
            background-color: #1a1a1a;
            color: #ffffff !important;
            padding: 15px 40px;
            text-decoration: none;
            display: inline-block;
            font-size: 12px;
            font-weight: bold;
            letter-spacing: 2px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="#" class="logo">LCWIKI</a>
        </div>
        <div class="content">
            {% block content %}{% endblock %}
        </div>
        <div class="footer">
            &copy; 2026 LCWIKI LUXURY BRANDS. ALL RIGHTS RESERVED.
        </div>
    </div>
</body>
</html>
