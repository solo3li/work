{% extends "base.html" %}
{% block title %}Register - LCwiki{% endblock %}
{% block content %}
<div style="max-width: 400px; margin: 80px auto;">
    <h1 style="text-align: center; margin-bottom: 40px;">Create Account</h1>
    <form method="post">
        {% csrf_token %}
        <div>
            <label>Email Address</label>
            <input type="email" name="email" required placeholder="example@luxury.com">
        </div>
        <div>
            <label>Password</label>
            <input type="password" name="password" required placeholder="Minimum 8 characters">
        </div>
        <button type="submit" class="btn" style="width: 100%;">Create Account</button>
    </form>
    <p style="text-align: center; margin-top: 20px; font-size: 0.9rem;">
        Already have an account? <a href="{% url 'login' %}" style="color: var(--gold);">Login</a>
    </p>
</div>
{% endblock %}
