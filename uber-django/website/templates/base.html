{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Taxi App{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'style.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">METALLIC TAXI</div>
        <div class="nav-links">
            {% if user.is_authenticated %}
                <a href="{% url 'home' %}" style="color: #ecf0f1; text-decoration: none; margin-right: 20px;"><i class="fas fa-home"></i> Home</a>
                <a href="{% url 'ride_history' %}" style="color: #ecf0f1; text-decoration: none; margin-right: 20px;"><i class="fas fa-history"></i> History</a>
                <a href="{% url 'profile' %}" style="color: #ecf0f1; text-decoration: none; margin-right: 20px;"><i class="fas fa-user-circle"></i> Profile</a>
                <a href="{% url 'logout' %}" class="btn-metallic" style="text-decoration: none; padding: 5px 15px;">Logout</a>
            {% else %}
                <a href="{% url 'login' %}" class="btn-metallic" style="text-decoration: none; padding: 5px 15px;">Login</a>
                <a href="{% url 'register' %}" class="btn-metallic" style="margin-left: 10px; text-decoration: none; padding: 5px 15px;">Register</a>
            {% endif %}
        </div>
    </nav>

    <div class="container">
        {% if messages %}
            {% for message in messages %}
                <div class="metallic-card" style="margin-bottom: 1rem; padding: 10px;">{{ message }}</div>
            {% endfor %}
        {% endif %}

        {% block content %}
        {% endblock %}
    </div>
</body>
</html>
