<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }
        .container {
            max-width: 600px;
            margin: 20px auto;
            background: linear-gradient(135deg, #2c3e50 0%, #000000 100%);
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .header {
            background: linear-gradient(to bottom, #434343 0%, #000000 100%);
            padding: 30px;
            text-align: center;
            border-bottom: 2px solid #555;
        }
        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #ffffff;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(255,255,255,0.3);
        }
        .content {
            padding: 40px;
            color: #ecf0f1;
            text-align: center;
        }
        .otp-box {
            background: linear-gradient(145deg, #e6e6e6, #999999);
            color: #1a1a1a;
            font-size: 36px;
            font-weight: bold;
            padding: 20px;
            border-radius: 10px;
            margin: 30px 0;
            letter-spacing: 10px;
            display: inline-block;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .footer {
            padding: 20px;
            text-align: center;
            color: #888;
            font-size: 12px;
            border-top: 1px solid #333;
        }
        .btn {
            display: inline-block;
            padding: 12px 30px;
            background: #cfd8dc;
            color: #000;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">METALLIC TAXI</div>
        </div>
        <div class="content">
            <h2 style="color: #fff; margin-bottom: 10px;">Verify Your Account</h2>
            <p style="color: #bdc3c7;">Welcome to the fleet! Use the code below to complete your registration.</p>
            
            <div class="otp-box">{{ otp }}</div>
            
            <p style="color: #888; font-size: 14px;">This code will expire in 10 minutes.<br>If you didn't request this, please ignore this email.</p>
        </div>
        <div class="footer">
            &copy; 2026 Metallic Taxi Service. All rights reserved.<br>
            Professional Transport Solutions.
        </div>
    </div>
</body>
</html>
