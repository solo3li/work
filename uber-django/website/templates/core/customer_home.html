{% extends 'base.html' %}

{% block title %}Book a Ride - Metallic Taxi{% endblock %}

{% block content %}
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<div style="display: grid; grid-template-columns: 350px 1fr; gap: 2rem;">
    <div class="metallic-card" style="height: calc(100vh - 150px); overflow-y: auto;">
        <h3 style="margin-top: 0; border-bottom: 1px solid #444; padding-bottom: 10px;">BOOK YOUR RIDE</h3>
        
        <div style="margin-top: 1.5rem;">
            <label><i class="fas fa-circle-dot" style="color: #cfd8dc;"></i> Pickup Location</label>
            <input type="text" class="form-input" placeholder="Current Location" id="pickup">
            
            <label><i class="fas fa-location-dot" style="color: #ff6b6b;"></i> Destination</label>
            <input type="text" class="form-input" placeholder="Where to?" id="destination">
        </div>

        <div style="margin-top: 1rem;">
            <label>Select Ride Type</label>
            <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 10px;">
                <div class="ride-option selected" style="padding: 10px; border: 1px solid #666; border-radius: 10px; text-align: center; cursor: pointer; background: rgba(255,255,255,0.05);">
                    <i class="fas fa-car" style="font-size: 1.2rem;"></i>
                    <div style="font-size: 0.8rem; margin-top: 5px;">Economy</div>
                </div>
                <div class="ride-option" style="padding: 10px; border: 1px solid #444; border-radius: 10px; text-align: center; cursor: pointer;">
                    <i class="fas fa-car-side" style="font-size: 1.2rem;"></i>
                    <div style="font-size: 0.8rem; margin-top: 5px;">Standard</div>
                </div>
                <div class="ride-option" style="padding: 10px; border: 1px solid #444; border-radius: 10px; text-align: center; cursor: pointer;">
                    <i class="fas fa-suv" style="font-size: 1.2rem;"></i>
                    <div style="font-size: 0.8rem; margin-top: 5px;">XL</div>
                </div>
                <div class="ride-option" style="padding: 10px; border: 1px solid #444; border-radius: 10px; text-align: center; cursor: pointer;">
                    <i class="fas fa-motorcycle" style="font-size: 1.2rem;"></i>
                    <div style="font-size: 0.8rem; margin-top: 5px;">Bike</div>
                </div>
            </div>
        </div>

        <div style="margin-top: 2rem; border-top: 1px solid #444; padding-top: 1.5rem;">
            <div style="display: flex; justify-content: space-between; margin-bottom: 1rem;">
                <span>Estimated Fare:</span>
                <span style="font-weight: bold; font-size: 1.2rem; color: #fff;">$12.50 (CASH)</span>
            </div>
            <button class="btn-metallic" style="width: 100%; padding: 15px;">CONFIRM BOOKING</button>
        </div>
    </div>

    <div id="map" style="height: calc(100vh - 150px); border-radius: 15px; border: 2px solid #333; box-shadow: 0 0 20px rgba(0,0,0,0.5);"></div>
</div>

<style>
    .ride-option.selected {
        border-color: #cfd8dc !important;
        background: rgba(255,255,255,0.1) !important;
        box-shadow: 0 0 10px rgba(255,255,255,0.1);
    }
    #map { background: #1a1a1a; }
    .leaflet-container { background: #1a1a1a !important; }
</style>

<script>
    var map = L.map('map').setView([51.505, -0.09], 13);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; OpenStreetMap &copy; CARTO'
    }).addTo(map);

    // Initial Marker
    L.marker([51.505, -0.09]).addTo(map)
        .bindPopup('You are here')
        .openPopup();
</script>
{% endblock %}
