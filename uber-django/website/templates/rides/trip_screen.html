{% extends 'base.html' %}

{% block title %}On Trip - Metallic Taxi{% endblock %}

{% block content %}
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<div style="display: grid; grid-template-columns: 350px 1fr; gap: 2rem;">
    <div class="metallic-card">
        <h3 style="margin-top: 0; color: #4ade80;">TRIP IN PROGRESS</h3>
        
        <div style="margin-top: 2rem; border-bottom: 1px solid #333; padding-bottom: 1.5rem;">
            <div style="color: #888; font-size: 0.8rem;">DRIVER</div>
            <div style="display: flex; align-items: center; margin-top: 10px;">
                <div style="width: 50px; height: 50px; background: #444; border-radius: 50%; margin-right: 15px;"></div>
                <div>
                    <div style="font-weight: bold;">{{ ride.driver.email|default:"Searching..." }}</div>
                    <div style="font-size: 0.8rem; color: #666;">Toyota Prius (Metallic Silver)</div>
                </div>
            </div>
        </div>

        <div style="margin-top: 1.5rem;">
            <div style="display: flex; gap: 10px; margin-bottom: 1rem;">
                <button class="btn-metallic" style="flex: 1; padding: 10px;"><i class="fas fa-phone"></i> CALL</button>
                <button class="btn-metallic" style="flex: 1; padding: 10px;"><i class="fas fa-comment"></i> CHAT</button>
            </div>
            <button class="btn-metallic" style="width: 100%; padding: 10px; background: #500; color: white;"><i class="fas fa-triangle-exclamation"></i> SOS BUTTON</button>
        </div>

        <div style="margin-top: 2rem; background: rgba(0,0,0,0.2); padding: 1rem; border-radius: 10px; border: 1px solid #333;">
            <div style="display: flex; justify-content: space-between;">
                <span>Fare (CASH)</span>
                <span style="font-weight: bold;">${{ ride.fare_estimate }}</span>
            </div>
            <div style="display: flex; justify-content: space-between; margin-top: 5px; color: #888; font-size: 0.8rem;">
                <span>ETA</span>
                <span>8 Mins</span>
            </div>
        </div>
    </div>

    <div id="map" style="height: calc(100vh - 150px); border-radius: 15px; border: 2px solid #333;"></div>
</div>

<script>
    var map = L.map('map').setView([{{ ride.pickup_latitude }}, {{ ride.pickup_longitude }}], 15);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; CARTO'
    }).addTo(map);

    L.marker([{{ ride.pickup_latitude }}, {{ ride.pickup_longitude }}]).addTo(map).bindPopup('Pickup');
    L.marker([{{ ride.dropoff_latitude }}, {{ ride.dropoff_longitude }}]).addTo(map).bindPopup('Destination');
</script>
{% endblock %}
